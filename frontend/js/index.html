<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión TUPA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Sistema de Gestión TUPA</h1>
  </header>

  <main>
    <section id="lista-procedimientos">
      <h2>Procedimientos Administrativos</h2>
      <table id="tabla-procedimientos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Costo</th>
            <th>Plazo</th>
          </tr>
        </thead>
        <tbody>
          <!-- Los datos se cargan dinámicamente desde app.js -->
        </tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Gestión TUPA</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
